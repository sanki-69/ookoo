<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cute App 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffc0cb, #d8b4fe, #ffe4e6);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgba(255,255,255,0.7);
      padding: 25px;
      border-radius: 25px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    img {
      width: 180px;
      height: 180px;
      border-radius: 20px;
      margin-bottom: 15px;
    }

    h1 {
      color: #ec4899;
      font-size: 20px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      margin: 5px;
      font-weight: bold;
      transition: 0.2s;
    }

    .yes {
      background: #ec4899;
      color: white;
    }

    .no {
      background: #e5e7eb;
    }

    button:hover {
      transform: scale(1.1);
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- BEFORE CLICK -->
  <div id="before">
    <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExd3Y3dGVsNnc0aXBpbGg2aTNsYnc1aWxibDQ2b3R3d2x5ZHphaDlpdSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/DHKDB8OdEVMkwTX3IQ/giphy.gif" />

    <h1 id="question">💌 Hoorhon sankig harmaar bnuu?</h1>

    <div>
      <button class="yes" onclick="yesClick()">💖 Harmaareen</button>
      <button class="no" onclick="noClick()" id="noBtn">Harmaargui bn 💭</button>
    </div>
  </div>

  <!-- AFTER CLICK -->
  <div id="after" class="hidden">
    <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmpsbml5YWdyYTE4bG5zb29hbWpkajBwZHdyanV6b3VjbGF3Nnk5aSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/jDA7CqG6PNA1sNYCyH/giphy.gif" />

    <h1>💞NoNoNo Harah Bolooguijuu💖</h1>
  </div>

</div>

<script>
  let noTexts = [
    "🥺 neeree harmaargui bgamu",
    "💔 bi hoorhonshde",
    "😢 haramsvaa",
    "👉 suuliin bolomj shu",
    "😈 nadaa durguil ym bnldaa"
  ];

  function noClick() {
    let random = noTexts[Math.floor(Math.random() * noTexts.length)];
    document.getElementById("noBtn").innerText = random;
  }

  function yesClick() {
    document.getElementById("before").classList.add("hidden");
    document.getElementById("after").classList.remove("hidden");
  }
</script>

</body>
</html>
